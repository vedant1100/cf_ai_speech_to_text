<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.75rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; color: #aaa; font-weight: 500; }

    #clear-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      padding: 0.3rem 0.7rem;
      border-radius: 1rem;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #clear-btn:hover { border-color: #555; color: #aaa; }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding-right: 0.25rem;
    }

    .msg {
      max-width: 78%;
      padding: 0.55rem 0.85rem;
      border-radius: 1.1rem;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      border-bottom-right-radius: 0.2rem;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 0.2rem;
    }
    .msg.thinking { color: #555; font-style: italic; }

    #status { font-size: 0.78rem; color: #555; min-height: 1.1em; text-align: center; }

    #controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #text-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #eee;
      font-size: 0.93rem;
      outline: none;
    }
    #text-input:focus { border-color: #1d4ed8; }

    #send-btn, #mic-btn {
      border: none;
      border-radius: 50%;
      width: 2.4rem;
      height: 2.4rem;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn { background: #1d4ed8; color: #fff; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #mic-btn { background: #1e1e1e; border: 1px solid #2a2a2a; }
    #mic-btn.recording { background: #dc2626; border-color: #dc2626; }
    #mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Voice Chat</h1>
      <button id="clear-btn">Clear</button>
    </header>

    <div id="messages"></div>
    <div id="status"></div>

    <div id="controls">
      <button id="mic-btn" title="Click to speak">🎤</button>
      <input id="text-input" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="send-btn" title="Send">➤</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const textInput  = document.getElementById('text-input');
    const sendBtn    = document.getElementById('send-btn');
    const micBtn     = document.getElementById('mic-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const statusEl   = document.getElementById('status');

    const sessionId  = sessionStorage.getItem('sid') || crypto.randomUUID();
    sessionStorage.setItem('sid', sessionId);

    function setStatus(msg) { statusEl.textContent = msg; }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send(text) {
      text = text.trim();
      if (!text) return;

      addMessage('user', text);
      textInput.value = '';
      sendBtn.disabled = true;
      setStatus('Thinking…');

      const thinking = addMessage('assistant thinking', '…');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text }),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(err || res.statusText);
        }

        const { reply } = await res.json();
        thinking.className = 'msg assistant';
        thinking.textContent = reply;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        setStatus('');

        if ('speechSynthesis' in window) {
          speechSynthesis.cancel();
          speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
        }
      } catch (err) {
        thinking.remove();
        setStatus('Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        textInput.focus();
      }
    }

    sendBtn.addEventListener('click', () => send(textInput.value));
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(textInput.value); }
    });

    clearBtn.addEventListener('click', async () => {
      await fetch('/api/chat', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      messagesEl.innerHTML = '';
      setStatus('Cleared.');
      setTimeout(() => setStatus(''), 1500);
    });

    // Voice input
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      rec.lang = 'en-US';
      rec.interimResults = false;

      rec.onresult = (e) => send(e.results[0][0].transcript);
      rec.onend    = () => { micBtn.classList.remove('recording'); setStatus(''); };
      rec.onerror  = (e) => { micBtn.classList.remove('recording'); setStatus('Mic error: ' + e.error); };

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('recording')) {
          rec.stop();
        } else {
          rec.start();
          micBtn.classList.add('recording');
          setStatus('Listening…');
        }
      });
    } else {
      micBtn.disabled = true;
      micBtn.title = 'Speech recognition not supported';
    }
  </script>
</body>
</html>
